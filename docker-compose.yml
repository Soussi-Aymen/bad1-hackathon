services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dealbridge-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    command: uvicorn main:app --reload --host 0.0.0.0 --port 8000

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dealbridge-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
      - VITE_USE_MOCKS=false
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
